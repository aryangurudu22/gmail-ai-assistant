<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail AI Assistant — Enter Access Code</title>
    <style>
        /* Full page centered layout with dark background matching dashboard */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Outer wrapper for logo above card */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
        }

        /* Brand name above the card — matches dashboard style */
        .brand {
            font-size: 15px;
            font-weight: 600;
            color: #8b8fa8;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* The dark card matching dashboard theme */
        .card {
            background: #1a1d2e;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            width: 100%;
            text-align: center;
        }

        /* Lock icon at top of card — signals security to client */
        .lock-icon {
            font-size: 32px;
            margin-bottom: 16px;
        }

        /* Main title */
        h1 {
            font-size: 22px;
            color: #ffffff;
            margin: 0 0 8px 0;
            font-weight: 600;
        }

        /* Tagline — tells client what this tool does in one line */
        .tagline {
            color: #8b8fa8;
            font-size: 13px;
            margin: 0 0 8px 0;
            line-height: 1.5;
        }

        /* Divider line */
        .divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin: 20px 0;
        }

        /* Instruction text */
        .instruction {
            color: #8b8fa8;
            font-size: 13px;
            margin: 0 0 16px 0;
        }

        /* Input box styling */
        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 18px;
            background: #0f1117;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            box-sizing: border-box;
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ffffff;
            font-weight: 600;
        }

        /* Input focus state */
        input:focus {
            outline: none;
            border-color: #4285f4;
        }

        /* Placeholder styling */
        input::placeholder {
            color: #4a4f6a;
            letter-spacing: 2px;
            font-size: 14px;
            font-weight: 400;
        }

        /* Submit button */
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4285f4, #3367d6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        /* Button hover state */
        button:hover {
            opacity: 0.9;
        }

        /* Error message */
        .error {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 14px;
            padding: 10px;
            background: rgba(255,107,107,0.1);
            border-radius: 8px;
            border: 1px solid rgba(255,107,107,0.2);
        }

        /* Security note at bottom — builds trust with client */
        .security-note {
            margin-top: 20px;
            font-size: 12px;
            color: #4a4f6a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>
<body>
    <div class="wrapper">

        <!-- Brand name above card -->
        <div class="brand">Gmail AI Assistant</div>

        <div class="card">

            <!-- Lock icon — signals to client this is a secure, paid product -->
            <div class="lock-icon">🔐</div>

            <!-- Title -->
            <h1>Welcome Back</h1>

            <!-- One line tagline — tells client exactly what this tool does -->
            <p class="tagline">Your AI-powered inbox assistant.<br>Analyse, prioritise, and reply to emails in seconds.</p>

            <hr class="divider">

            <!-- Instruction -->
            <p class="instruction">Enter your access code to continue</p>

            <!-- The form that sends the code to Flask -->
            <form method="POST" action="/verify-code">
                <input
                    type="text"
                    name="access_code"
                    placeholder="ENTER CODE"
                    required
                    autocomplete="off"
                />
                <button type="submit">Continue →</button>
            </form>

            <!-- Error message shown when code is wrong -->
            {% if error %}
            <div class="error">⚠️ {{ error }}</div>
            {% endif %}

            <!-- Security note — builds trust when client sees it -->
            <div class="security-note">
                🔒 Secure access · Your data is never shared
            </div>

        </div>
    </div>
</body>
</html>
